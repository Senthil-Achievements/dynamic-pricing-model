{% extends "layout.html" %}

{% block content %}
<div class="row py-5 fade-in">
    <div class="col-md-5 mx-auto">
        <div class="card border-0 shadow-2xl rounded-5 overflow-hidden">
            <div class="card-header bg-dark text-white text-center py-5 border-0">
                <h2 class="fw-bold mb-0" style="letter-spacing: -0.04em;">Auth Access</h2>
                <p class="mb-0 opacity-75">Secure portal for marketplace management</p>
            </div>
            <div class="card-body p-5">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-secondary">EMAIL ADDRESS</label>
                        <input type="email" name="email"
                            class="form-control form-control-lg rounded-4 bg-light border-0"
                            placeholder="name@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-secondary">PASSWORD</label>
                        <input type="password" name="password"
                            class="form-control form-control-lg rounded-4 bg-light border-0" placeholder="••••••••"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-4 py-3 mb-4 shadow-xl">Initiate
                        Protocol</button>
                    <div class="text-center">
                        <span class="text-muted">New to the collective?</span>
                        <a href="{{ url_for('auth.register') }}"
                            class="text-primary text-decoration-none fw-bold ms-1">Create Identity</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
