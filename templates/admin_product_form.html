{% extends "layout.html" %}

{% block content %}
<div class="row py-5">
    <div class="col-md-8 mx-auto">
        <div class="card border-0 shadow-lg rounded-5 overflow-hidden">
            <div class="card-header bg-primary text-white text-center py-4 border-0">
                <h3 class="fw-bold mb-0">{{ title }}</h3>
                <p class="mb-0 opacity-75">Fill in the product details below</p>
            </div>
            <div class="card-body p-5">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Product Name</label>
                        <input type="text" name="name" class="form-control rounded-3"
                            value="{{ product.name if product else '' }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control rounded-3"
                            rows="3">{{ product.description if product else '' }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Base Price (₹)</label>
                            <input type="number" step="0.01" name="base_price" class="form-control rounded-3"
                                value="{{ product.base_price if product else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Category</label>
                            <input type="text" name="category" class="form-control rounded-3"
                                value="{{ product.category if product else '' }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Stock Quantity</label>
                            <input type="number" name="stock" class="form-control rounded-3"
                                value="{{ product.stock if product else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Image URL</label>
                            <input type="url" name="image_url" class="form-control rounded-3"
                                value="{{ product.image_url if product else '' }}">
                        </div>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('admin.dashboard') }}"
                            class="btn btn-outline-secondary rounded-3 px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary rounded-3 px-5">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
